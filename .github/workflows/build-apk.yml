name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Configure release signing
        run: |
          # Generate a keystore for signing
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore android/app/release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Deutsch Lernen, OU=Dev, O=Dev, L=Berlin, ST=Berlin, C=DE"

          # Inject signing config into the existing android block in build.gradle
          # We use sed to add signingConfigs before the closing of the android block
          # and configure the release buildType to use it
          python3 << 'PYEOF'
          import re

          with open("android/app/build.gradle", "r") as f:
              content = f.read()

          # Add signingConfigs inside the android block, right after "android {"
          signing_config = '''
    signingConfigs {
        release {
            storeFile file("release.keystore")
            storePassword "android"
            keyAlias "release"
            keyPassword "android"
        }
    }
'''
          # Insert after the first "android {" line
          content = content.replace(
              'android {',
              'android {\n' + signing_config,
              1
          )

          # Make release buildType use the signing config
          # Find "buildTypes {" and add/modify release config
          if 'release {' in content and 'signingConfig' not in content:
              content = content.replace(
                  'release {',
                  'release {\n            signingConfig signingConfigs.release',
                  1
              )
          elif 'buildTypes {' in content and 'release {' not in content:
              content = content.replace(
                  'buildTypes {',
                  'buildTypes {\n        release {\n            signingConfig signingConfigs.release\n            minifyEnabled false\n            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"\n        }',
                  1
              )

          with open("android/app/build.gradle", "w") as f:
              f.write(content)

          print("Signing config injected successfully")
          PYEOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: deutsch-lernen
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Deutsch Lernen v1.0.0 (Build ${{ github.run_number }})
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
